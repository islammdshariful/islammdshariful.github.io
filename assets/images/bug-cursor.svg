    <line x1="24" y1="10" x2="19" y2="2" stroke-width="2.5"/>
    <line x1="40" y1="10" x2="45" y2="2" stroke-width="2.5"/>

    <!-- Head -->
    <path d="M22 14 Q22 8 32 8 Q42 8 42 14 Z" fill="#222" stroke-width="0"/>
    <!-- Eyes -->
    <circle cx="27" cy="12" r="3" fill="none" stroke="white" stroke-width="1.5"/>
