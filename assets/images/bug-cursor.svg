    <circle cx="37" cy="12" r="3" fill="none" stroke="white" stroke-width="1.5"/>
    <circle cx="37" cy="12" r="1" fill="white" stroke="none"/>

    <!-- Body outline (shorter) -->
    <path d="M18 16 Q18 14 22 14 L42 14 Q46 14 46 16 L46 38 Q46 48 32 48 Q18 48 18 38 Z" stroke-width="2.5"/>

    <!-- Left legs -->
    <line x1="18" y1="22" x2="10" y2="18" stroke-width="2.5"/>
    <line x1="18" y1="30" x2="10" y2="30" stroke-width="2.5"/>
    <line x1="18" y1="38" x2="10" y2="42" stroke-width="2.5"/>

    <!-- Right legs -->
    <line x1="46" y1="22" x2="54" y2="18" stroke-width="2.5"/>
    <line x1="46" y1="30" x2="54" y2="30" stroke-width="2.5"/>
    <line x1="46" y1="38" x2="54" y2="42" stroke-width="2.5"/>

    <!-- Circuit traces on body -->
    <circle cx="26" cy="26" r="3" stroke="#222" stroke-width="1.8"/>
