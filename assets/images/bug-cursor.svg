    <line x1="26" y1="29" x2="26" y2="36" stroke="#222" stroke-width="1.8"/>
    <circle cx="26" cy="38" r="2.5" stroke="#222" stroke-width="1.8"/>
    <circle cx="26" cy="38" r="0.8" fill="#222" stroke="none"/>

    <circle cx="38" cy="22" r="3" stroke="#222" stroke-width="1.8"/>
    <circle cx="38" cy="22" r="1" fill="#222" stroke="none"/>
    <path d="M38 25 L38 30 Q38 34 34 36" stroke="#222" stroke-width="1.8"/>
    <circle cx="38" cy="34" r="2.5" stroke="#222" stroke-width="1.8"/>
    <circle cx="38" cy="34" r="0.8" fill="#222" stroke="none"/>
    <line x1="38" y1="36.5" x2="38" y2="43" stroke="#222" stroke-width="1.8"/>

    <line x1="29" y1="26" x2="35" y2="22" stroke="#222" stroke-width="1.8"/>
